<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ff00ff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .circle-bg {
            width: 600px;
            height: 600px;
            background-color: #ffff00;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* Perspectiva para profundidade */
            perspective: 2000px; 
        }

        .container-winrar {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        .card {
            position: absolute;
            width: 300px;
            height: 160px;
            background: white;
            border-radius: 2px;
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 40px;
            box-sizing: border-box;
            border-bottom: 4px solid #ddd; /* Efeito de espessura do papel */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- POSICIONAMENTO IDÊNTICO AO WINRAR --- */
        /* Usamos rotação e inclinação (skew) para o efeito de perspectiva de lado */
        
        .card:nth-child(1) { 
            transform: translateY(-40px) rotateX(40deg) rotateZ(-15deg) skewX(10deg); 
            z-index: 3;
            box-shadow: -10px 20px 30px rgba(0,0,0,0.2);
        }

        .card:nth-child(2) { 
            transform: translateY(0px) rotateX(40deg) rotateZ(-15deg) skewX(10deg); 
            z-index: 2;
            box-shadow: -10px 15px 25px rgba(0,0,0,0.15);
        }

        .card:nth-child(3) { 
            transform: translateY(40px) rotateX(40deg) rotateZ(-15deg) skewX(10deg); 
            z-index: 1;
            box-shadow: -10px 10px 20px rgba(0,0,0,0.1);
        }

        .info {
            opacity: 0;
            transition: opacity 0.3s;
            text-align: center;
        }

        /* --- HOVER: EXPLOSÃO E ENDIREITAMENTO --- */

        .circle-bg:hover .card {
            width: 350px;
            height: 550px;
            /* Remove a inclinação do WinRAR e deixa as folhas retas e grandes */
            transform: rotateX(0deg) rotateZ(0deg) skewX(0deg) translateY(0);
            box-shadow: 0 40px 80px rgba(0,0,0,0.3);
            border-bottom: 1px solid #ddd;
        }

        /* Distância lateral extrema []  []  [] */
        .circle-bg:hover .card:nth-child(1) { transform: translateX(-450px) rotateY(10deg); }
        .circle-bg:hover .card:nth-child(2) { transform: translateX(0) scale(1.15); z-index: 10; }
        .circle-bg:hover .card:nth-child(3) { transform: translateX(450px) rotateY(-10deg); }

        .circle-bg:hover .info {
            opacity: 1;
            transition-delay: 0.5s;
        }

        h2 { font-size: 38px; color: #111; margin: 0; }
        p { font-size: 18px; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="circle-bg">
        <div class="container-winrar">
            <div class="card">
                <div class="info">
                    <h2>01</h2>
                    <p>Conteúdo da folha superior da pilha.</p>
                </div>
            </div>
            <div class="card">
                <div class="info">
                    <h2>WINRAR</h2>
                    <p>A pilha se abriu e agora você vê tudo grande.</p>
                </div>
            </div>
            <div class="card">
                <div class="info">
                    <h2>03</h2>
                    <p>Conteúdo da folha inferior da pilha.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
